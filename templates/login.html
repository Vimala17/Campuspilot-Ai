<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusPilot AI - Student Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page-layout">
    <div class="auth-card-wrapper">
        <div class="auth-brand-header">
            <i class="fa-solid fa-rocket auth-logo-icon"></i>
            <h2>CampusPilot AI</h2>
            <p class="auth-subtitle">Login to access your college assistant companion.</p>
        </div>
        
        <form id="loginForm">
            <div class="auth-input-group">
                <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                <input type="email" id="loginEmail" placeholder="vanaparthivimala@gmail.com" required>
            </div>
            <div class="auth-input-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" placeholder="•••••" required>
            </div>
            <button type="submit" class="auth-action-btn">
                <span>Login </span> <i class="fa-solid fa-key"></i>
            </button>
        </form>
        
        <p class="auth-redirect-text">Don't have an account? <a href="/signup">Sign Up here</a></p>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value.trim();

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (data.status === "success") {
                    window.location.href = "/";
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error("Connection drops tracking:", err);
                alert("Server interface unreachable.");
            }
        });
    </script>
</body>
</html>
